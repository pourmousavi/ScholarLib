name = "scholarlib-api"
main = "index.js"
compatibility_date = "2024-01-01"

# KV Namespaces - Replace with your actual KV namespace IDs
# Create these in Cloudflare dashboard: Workers & Pages > KV > Create namespace
# Then run: wrangler kv:namespace list to get the IDs

[[kv_namespaces]]
binding = "SHARES"
id = "125a40ad1ec34448ae2d724b1b17dcc2"

[[kv_namespaces]]
binding = "ACCESS"
id = "e73acc4a444f4b77a544fc3bb9615a42"

[[kv_namespaces]]
binding = "LOGS"
id = "9204f5d5d3a145f3b92aa17cba901d5c"

[[kv_namespaces]]
binding = "AUTH_CACHE"
# TODO(ali): Run `wrangler kv:namespace create AUTH_CACHE` and paste the resulting ID here
id = "REPLACE_WITH_NEW_KV_ID"

[vars]
# Update with your actual domains
# Add LitOrbit origin when deployed (e.g. https://litorbit.alipourmousavi.com)
ALLOWED_ORIGINS = "https://alipourmousavi.com,http://localhost:5173"
