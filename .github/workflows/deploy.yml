name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Build main React app
      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build
        env:
          VITE_BOX_CLIENT_ID: ${{ secrets.VITE_BOX_CLIENT_ID }}
          VITE_BOX_REDIRECT_URI: ${{ secrets.VITE_BOX_REDIRECT_URI }}
          VITE_DROPBOX_APP_KEY: ${{ secrets.VITE_DROPBOX_APP_KEY }}
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
          VITE_APP_BASE_URL: ${{ secrets.VITE_APP_BASE_URL }}

      # Build Docusaurus documentation
      - name: Install Docusaurus dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build Docusaurus site
        working-directory: ./docs
        run: npm run build

      # Combine builds
      - name: Combine builds
        run: |
          mkdir -p dist/docs
          cp -r docs/build/* dist/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
